services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai_dash
      POSTGRES_PASSWORD: ai_dash
      POSTGRES_DB: ai_dash
    ports:
      - "5432:5432"
    volumes:
      - ai_dash_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_dash"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ai_dash_pg_data:
