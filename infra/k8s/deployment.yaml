apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-dash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-dash
  template:
    metadata:
      labels:
        app: ai-dash
    spec:
      containers:
        - name: app
          image: ghcr.io/gromano-ltx/ai_dash:REPLACE_WITH_SHA
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-dash-secrets
                  key: DATABASE_URL
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-dash-secrets
                  key: SESSION_SECRET
