name: Deploy

on:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Frontend typecheck + build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Backend tests
        # Must run after the frontend build: backend/main.py only registers
        # its SPA catch-all route (and the tests that depend on it) when
        # frontend/dist already exists at import time.
        run: |
          pip install -e .
          pip install pytest httpx watchfiles
          python -m pytest backend/ -v

  deploy:
    needs: checks
    runs-on: ubuntu-slim
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/799926263517/locations/global/workloadIdentityPools/github-actions/providers/github"
          service_account: "github-deployer@devops-ai-tools.iam.gserviceaccount.com"

      - name: Deploy via Cloud Build
        # gcloud builds submit's wait/stream mechanism needs read access to
        # Cloud Build's Google-managed default logs bucket even with
        # --suppress-logs (confirmed live: identical "Viewer/Owner of the
        # project" error either way) — broader than github-deployer should
        # have, and not a bucket we can grant IAM on ourselves. Submitting
        # --async and polling status via `builds describe` avoids that
        # entirely: cloudbuild.builds.editor (already granted) includes
        # builds.get/.list, no log-bucket access needed at all.
        run: |
          SHA=$(git rev-parse --short HEAD)
          BUILD_ID=$(gcloud builds submit --config cloudbuild.yaml --substitutions=_TAG="$SHA" --async --format="value(id)" .)
          echo "Cloud Build ID: $BUILD_ID"
          for i in $(seq 1 120); do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format="value(status)")
            echo "Status: $STATUS"
            case "$STATUS" in
              SUCCESS) exit 0 ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                echo "Build failed with status: $STATUS" >&2
                exit 1
                ;;
            esac
            sleep 5
          done
          echo "Timed out waiting for build to complete" >&2
          exit 1
