name: Deploy

on:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Frontend typecheck + build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Backend tests
        # Must run after the frontend build: backend/main.py only registers
        # its SPA catch-all route (and the tests that depend on it) when
        # frontend/dist already exists at import time.
        run: |
          pip install -e .
          pip install pytest httpx watchfiles
          python -m pytest backend/ -v

  deploy:
    needs: checks
    runs-on: ubuntu-slim
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -t "ghcr.io/gromano-ltx/ai_dash:$SHA" .
          docker push "ghcr.io/gromano-ltx/ai_dash:$SHA"
          echo "SHA=$SHA" >> "$GITHUB_ENV"

      - name: Set up kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Deploy to k3s
        run: |
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > kubeconfig
          KUBECONFIG=kubeconfig kubectl set image deployment/ai-dash "app=ghcr.io/gromano-ltx/ai_dash:$SHA"
          KUBECONFIG=kubeconfig kubectl rollout status deployment/ai-dash --timeout=120s
          rm kubeconfig
