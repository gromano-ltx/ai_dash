name: Deploy

on:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Backend import check
        run: |
          pip install -e .
          python -c "import backend.main"

      - name: Frontend typecheck + build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

  deploy:
    needs: checks
    runs-on: ubuntu-slim
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/799926263517/locations/global/workloadIdentityPools/github-actions/providers/github"
          service_account: "github-deployer@devops-ai-tools.iam.gserviceaccount.com"

      - name: Deploy via Cloud Build
        run: gcloud builds submit --config cloudbuild.yaml .
