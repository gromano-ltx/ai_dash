name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Collector tests
        run: |
          pip install pytest httpx watchfiles
          python -m pytest collector/test_collector.py -v

      - name: Frontend typecheck + build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Backend tests
        # Must run after the frontend build: backend/main.py only registers
        # its SPA catch-all route (and the tests that depend on it) when
        # frontend/dist already exists at import time.
        run: |
          pip install -e .
          pip install pytest httpx watchfiles
          python -m pytest backend/ -v
