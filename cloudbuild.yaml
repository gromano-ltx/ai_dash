substitutions:
  _REGION: us-central1
  _SERVICE: ai-dash
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE}/app

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "${_IMAGE}:${SHORT_SHA}", -t, "${_IMAGE}:latest", .]

  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_IMAGE}"]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed

images:
  - ${_IMAGE}:${SHORT_SHA}
